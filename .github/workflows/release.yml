    # at the end of the bump-and-tag leg to trigger the publish leg.
    # Both must be listed or the 2-hop chain breaks.
    types: [do-release, release-passed]

jobs:
  release:
    uses: metanorma/ci/.github/workflows/rubygems-release.yml@main
