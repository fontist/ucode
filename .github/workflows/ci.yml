name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (PDF renderers)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mupdf-tools pdf2svg dvisvgm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs + rubocop
        run: bundle exec rake

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ruby-${{ matrix.ruby }}
          path: coverage/
